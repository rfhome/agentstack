# Suppress Docker linting warnings generated by Railway's Nixpacks build pipeline.
# These are false positives — secrets are injected securely by Railway at runtime,
# not embedded in the image. NIXPACKS_PATH is a Nixpacks-internal variable.
ignore:
  - DL3025  # SecretsUsedInArgOrEnv — Railway injects env vars via its secrets system
  - SC2154  # UndefinedVar ($NIXPACKS_PATH) — Nixpacks-internal, defined at build time
